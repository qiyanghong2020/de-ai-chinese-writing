interface:
  display_name: "去 AI 腔"
  short_description: "把中文文章、论文、文档和汇报改得更自然顺口，减少模板味、讲义腔、翻译腔、词汇过平和机器感"
  default_prompt: "Use $de-ai-chinese-writing to rewrite this Chinese draft, README, report, or thesis section so it sounds natural, direct, varied, and domain-appropriate while preserving meaning, facts, logic, and evidence boundaries. Prefer direct declarative sentences, avoid default contrast framing such as 不是……而是……, cut teacher-like scaffolding, and keep the reader relationship flat and respectful. If the text is thesis, medical, or academic prose, switch into a separate academic lane immediately: preserve evidence-reporting verbs and field-typical terms, do not add first person, oral markers, or mild attitude words, and do not rewrite study or analysis statements into colloquial observation phrases."
